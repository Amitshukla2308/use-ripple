<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HyperRetrieval — Codebase Map</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --bg2:       #161b27;
  --bg3:       #1e2435;
  --border:    #2a3147;
  --text:      #e2e8f0;
  --text-muted:#8892a4;
  --accent:    #3b82f6;
  --accent2:   #e07b39;
  --radius:    6px;
  --sidebar-w: 280px;
  --topbar-h:  52px;
  --bottombar-h: 28px;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, "Inter", -apple-system, sans-serif;
  font-size: 14px;
  overflow: hidden;
}

/* ── Top bar ──────────────────────────────────────────────────────────── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
  z-index: 100;
}

#topbar .logo {
  font-weight: 700; font-size: 15px; letter-spacing: .02em;
  color: var(--text); white-space: nowrap;
}
#topbar .logo span { color: var(--accent); }

.tabs { display: flex; gap: 2px; }
.tab {
  padding: 6px 14px; border-radius: var(--radius);
  cursor: pointer; border: none; background: transparent;
  color: var(--text-muted); font-size: 13px; font-family: inherit;
  transition: background 150ms, color 150ms;
}
.tab:hover { background: var(--bg3); color: var(--text); }
.tab.active { background: var(--accent); color: #fff; }
.tab.breadcrumb-sep { color: var(--text-muted); cursor: default; padding: 6px 4px; }

#search-box {
  margin-left: auto;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  padding: 5px 10px; font-size: 13px; font-family: inherit;
  width: 200px; outline: none;
  display: none; /* shown only in cluster view */
}
#search-box:focus { border-color: var(--accent); }
#search-box::placeholder { color: var(--text-muted); }

/* ── Bottom bar ───────────────────────────────────────────────────────── */
#bottombar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bottombar-h);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 20px;
  z-index: 100;
}
.meta-item { color: var(--text-muted); font-size: 12px; }
.meta-item strong { color: var(--text); }

/* ── Main canvas area ─────────────────────────────────────────────────── */
#canvas {
  position: fixed;
  top: var(--topbar-h); left: 0; right: 0;
  bottom: var(--bottombar-h);
}

/* ── Sidebar (View C) ────────────────────────────────────────────────── */
#sidebar {
  position: fixed;
  top: var(--topbar-h); right: 0;
  width: var(--sidebar-w);
  bottom: var(--bottombar-h);
  background: var(--bg2);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px 16px;
  display: none;
  z-index: 50;
}
#sidebar h2 { font-size: 15px; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
#sidebar .purpose { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 14px; }
#sidebar h3 { font-size: 12px; font-weight: 600; text-transform: uppercase;
              letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px; }
.badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.badge {
  font-size: 11px; padding: 3px 8px; border-radius: 12px;
  background: #3b1f1a; color: #f97316; border: 1px solid #7c2d12;
}
.contracts-list { list-style: none; }
.contracts-list li {
  font-size: 12px; color: var(--text-muted); padding: 4px 0;
  border-bottom: 1px solid var(--border); line-height: 1.4;
}
.contracts-list li:last-child { border-bottom: none; }

/* ── Service filter panel (View B) ───────────────────────────────────── */
#filter-panel {
  position: fixed;
  top: calc(var(--topbar-h) + 12px); left: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  z-index: 50;
  display: none;
  max-height: calc(100vh - var(--topbar-h) - var(--bottombar-h) - 24px);
  overflow-y: auto;
}
#filter-panel h4 { font-size: 11px; font-weight: 600; text-transform: uppercase;
                   letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px; }
.filter-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
.filter-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.filter-label { font-size: 12px; color: var(--text); }
.filter-item input[type=checkbox] { accent-color: var(--accent); }

/* ── Scatter canvas ──────────────────────────────────────────────────── */
#scatter-canvas {
  position: absolute; top: 0; left: 0;
  display: none;
  cursor: crosshair;
}

/* ── Scatter controls ────────────────────────────────────────────────── */
#scatter-controls {
  position: fixed;
  top: calc(var(--topbar-h) + 12px); left: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  z-index: 50;
  display: none;
  font-size: 12px;
}
#scatter-controls h4 {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px;
}
.color-btn {
  display: block; width: 100%; text-align: left;
  padding: 5px 8px; margin-bottom: 4px;
  border-radius: var(--radius); border: 1px solid var(--border);
  background: transparent; color: var(--text-muted);
  cursor: pointer; font-size: 12px; font-family: inherit;
  transition: background 120ms, color 120ms;
}
.color-btn:hover  { background: var(--bg3); color: var(--text); }
.color-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
#scatter-note {
  margin-top: 8px; font-size: 11px; color: var(--text-muted); line-height: 1.5;
}

/* ── SVG & graph elements ────────────────────────────────────────────── */
svg { width: 100%; height: 100%; display: block; }
.link { stroke-linecap: round; }
.node circle { cursor: pointer; transition: opacity 200ms; }
.node text { pointer-events: none; user-select: none; }
.node.dimmed circle { opacity: 0.15; }
.node.dimmed text   { opacity: 0.10; }

/* ── Tooltip ─────────────────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 13px;
  font-size: 12px;
  max-width: 300px;
  pointer-events: none;
  z-index: 200;
  display: none;
  line-height: 1.55;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
}
#tooltip .tt-title { font-weight: 600; font-size: 13px; margin-bottom: 5px; color: var(--text); }
#tooltip .tt-row   { color: var(--text-muted); }
#tooltip .tt-row strong { color: var(--text); }
#tooltip .tt-tag {
  display: inline-block; font-size: 11px; padding: 2px 6px;
  border-radius: 4px; background: #1e2d1e; color: #4ade80;
  margin: 2px 2px 0 0;
}
#tooltip .tt-flag {
  display: inline-block; font-size: 11px; padding: 2px 6px;
  border-radius: 4px; background: #3b1f1a; color: #f97316;
  margin: 2px 2px 0 0;
}
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div class="logo">Hyper<span>Retrieval</span></div>
  <div class="tabs" id="tabs">
    <button class="tab" id="tab-service" onclick="switchView('service')">Services</button>
    <button class="tab active" id="tab-cluster" onclick="switchView('cluster')">Clusters</button>
    <button class="tab" id="tab-scatter" onclick="switchView('scatter')">2D Scatter</button>
    <!-- tab-module injected dynamically -->
  </div>
  <input id="search-box" type="text" placeholder="Search clusters…" oninput="onSearch(this.value)" />
</div>

<!-- Bottom bar -->
<div id="bottombar">
  <span class="meta-item" id="meta-services"></span>
  <span class="meta-item" id="meta-clusters"></span>
  <span class="meta-item" id="meta-symbols"></span>
</div>

<!-- Main canvas -->
<div id="canvas">
  <svg id="svg"></svg>
  <canvas id="scatter-canvas"></canvas>
</div>

<!-- Sidebar (View C) -->
<div id="sidebar" id="sidebar"></div>

<!-- Service filter (View B) -->
<div id="filter-panel">
  <h4>Services</h4>
  <div id="filter-items"></div>
</div>

<!-- Scatter controls (View D) -->
<div id="scatter-controls">
  <h4>Color by</h4>
  <button class="color-btn active" id="cbtn-service" onclick="setScatterColor('service')">Service (12)</button>
  <button class="color-btn" id="cbtn-cluster" onclick="setScatterColor('cluster')">Cluster (56)</button>
  <div id="scatter-note"></div>
</div>

<!-- Tooltip -->
<div id="tooltip" id="tooltip"></div>

<script>
// ==========================================================================
// Palette
// ==========================================================================
const SERVICE_PALETTE = [
  "#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6",
  "#06b6d4","#ec4899","#84cc16","#f97316","#6366f1",
  "#14b8a6","#e879f9","#fb7185","#a3e635","#38bdf8"
];
const serviceColor = {};   // filled on init

// ==========================================================================
// State
// ==========================================================================
let DATA       = null;
let VIEW       = "cluster";   // "service" | "cluster" | "module"
let ACTIVE_CLUSTER = null;    // cluster id when in module view
let SVC_FILTER = new Set();   // services hidden in cluster view
let SEARCH_Q   = "";

// D3 simulation refs — torn down on each view switch
let sim = null;

// ==========================================================================
// Entry point
// ==========================================================================
fetch("viz_data.json")
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(data => init(data))
  .catch(err => {
    document.getElementById("canvas").innerHTML =
      `<div style="padding:40px;color:#ef4444;font-size:16px;">
        Failed to load viz_data.json: ${err.message}<br>
        <span style="color:#8892a4;font-size:13px;">Run build/09_build_viz_data.py first, then serve via tools/viz/serve.py</span>
       </div>`;
  });

function init(data) {
  DATA = data;

  // Assign colours
  const svcs = (data.services || []).map(s => s.id).sort();
  svcs.forEach((s, i) => { serviceColor[s] = SERVICE_PALETTE[i % SERVICE_PALETTE.length]; });

  // Meta bar
  const m = data.meta || {};
  document.getElementById("meta-services").innerHTML =
    `<strong>${m.service_count || 0}</strong> services`;
  document.getElementById("meta-clusters").innerHTML =
    `<strong>${m.cluster_count || 0}</strong> clusters`;
  document.getElementById("meta-symbols").innerHTML =
    `<strong>${(m.symbol_count || 0).toLocaleString()}</strong> symbols`;

  // Build filter panel
  buildFilterPanel(data.services || []);

  switchView("cluster");
}

// ==========================================================================
// View router
// ==========================================================================
function switchView(view, clusterNode) {
  VIEW = view;
  SEARCH_Q = "";
  document.getElementById("search-box").value = "";
  document.getElementById("search-box").style.display =
    (view === "cluster") ? "block" : "none";

  // Tab states
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (view === "service") {
    document.getElementById("tab-service").classList.add("active");
  } else if (view === "cluster") {
    document.getElementById("tab-cluster").classList.add("active");
    removeBreadcrumb();
  } else if (view === "scatter") {
    document.getElementById("tab-scatter").classList.add("active");
    removeBreadcrumb();
  } else {
    // breadcrumb handled below (module view)
  }

  document.getElementById("filter-panel").style.display =
    (view === "cluster") ? "block" : "none";
  document.getElementById("sidebar").style.display =
    (view === "module") ? "block" : "none";
  document.getElementById("scatter-controls").style.display =
    (view === "scatter") ? "block" : "none";

  // Show/hide scatter canvas vs SVG
  const svgEl     = document.getElementById("svg");
  svgEl.style.display            = (view === "scatter") ? "none" : "block";
  scatterCanvas.style.display    = (view === "scatter") ? "block" : "none";

  clearGraph();

  if (view === "service")  renderService();
  if (view === "cluster")  renderCluster();
  if (view === "scatter")  renderScatter();
  if (view === "module" && clusterNode) {
    ACTIVE_CLUSTER = clusterNode.id;
    addBreadcrumb(clusterNode.label);
    fillSidebar(clusterNode);
    renderModule(clusterNode);
  }
}

// ==========================================================================
// Clear graph
// ==========================================================================
function clearGraph() {
  if (sim) { sim.stop(); sim = null; }
  const svg = d3.select("#svg");
  svg.selectAll("*").remove();
}

// ==========================================================================
// Zoom helper — returns {svg, g, zoom}
// ==========================================================================
function setupSVG(rightPad) {
  const container = document.getElementById("canvas");
  const W = container.clientWidth  - (rightPad || 0);
  const H = container.clientHeight;

  const svg = d3.select("#svg")
    .attr("width", W).attr("height", H);

  const zoom = d3.zoom()
    .scaleExtent([0.1, 8])
    .on("zoom", ev => g.attr("transform", ev.transform));

  svg.call(zoom);

  const g = svg.append("g");

  // Initial center
  svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2));

  return { svg, g, zoom, W, H };
}

// ==========================================================================
// Tooltip helpers
// ==========================================================================
const tooltip = document.getElementById("tooltip");

function showTooltip(html, ev) {
  tooltip.innerHTML = html;
  tooltip.style.display = "block";
  positionTooltip(ev);
}
function hideTooltip() { tooltip.style.display = "none"; }
function positionTooltip(ev) {
  const pad = 14;
  let x = ev.clientX + pad;
  let y = ev.clientY + pad;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  if (x + tw > window.innerWidth)  x = ev.clientX - tw - pad;
  if (y + th > window.innerHeight) y = ev.clientY - th - pad;
  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
}

// ==========================================================================
// Radius scales
// ==========================================================================
function makeRadiusScale(values, rMin, rMax) {
  const sqrtMax = Math.sqrt(d3.max(values) || 1);
  const sqrtMin = Math.sqrt(d3.min(values) || 0);
  return val => {
    const s = Math.sqrt(val || 0);
    if (sqrtMax === sqrtMin) return (rMin + rMax) / 2;
    return rMin + (rMax - rMin) * (s - sqrtMin) / (sqrtMax - sqrtMin);
  };
}

// ==========================================================================
// VIEW A — Service Overview
// ==========================================================================
function renderService() {
  const { g, W, H } = setupSVG(0);
  const services = DATA.services || [];
  const edges    = DATA.service_edges || [];

  if (!services.length) {
    g.append("text").attr("text-anchor","middle").attr("fill","#8892a4")
     .text("No service data available");
    return;
  }

  const rScale = makeRadiusScale(services.map(s => s.symbol_count), 20, 80);

  // Build adjacency for tooltip
  const svcNeighbours = {};
  edges.forEach(e => {
    (svcNeighbours[e.source] = svcNeighbours[e.source] || []).push(e.target);
    (svcNeighbours[e.target] = svcNeighbours[e.target] || []).push(e.source);
  });

  // Nodes & links for d3
  const nodes = services.map(s => ({ ...s, r: rScale(s.symbol_count) }));
  const links = edges.map(e => ({ source: e.source, target: e.target, weight: e.weight }));

  const wScale = d3.scaleLog().domain([1, d3.max(links, l => l.weight) || 10]).range([1, 5]);

  // Links
  const linkSel = g.append("g").attr("class","links").selectAll("line")
    .data(links).join("line")
    .attr("class","link")
    .attr("stroke","#4a5568")
    .attr("stroke-width", d => wScale(d.weight))
    .attr("stroke-opacity", 0.6);

  // Nodes
  const nodeSel = g.append("g").selectAll(".node")
    .data(nodes).join("g").attr("class","node");

  nodeSel.append("circle")
    .attr("r", d => d.r)
    .attr("fill", d => serviceColor[d.id] || "#666")
    .attr("fill-opacity", 0.85)
    .attr("stroke", d => serviceColor[d.id] || "#666")
    .attr("stroke-width", 2)
    .attr("stroke-opacity", 0.4)
    .on("mousemove", (ev, d) => {
      const topClusters = (DATA.clusters || [])
        .filter(c => c.service === d.id)
        .sort((a,b) => b.symbol_count - a.symbol_count)
        .slice(0, 3)
        .map(c => c.label || `Cluster ${c.id}`)
        .join(", ");
      showTooltip(`
        <div class="tt-title">${d.id}</div>
        <div class="tt-row">Symbols: <strong>${(d.symbol_count||0).toLocaleString()}</strong></div>
        <div class="tt-row">Modules: <strong>${(d.module_count||0).toLocaleString()}</strong></div>
        <div class="tt-row">Clusters: <strong>${(d.cluster_ids||[]).length}</strong></div>
        ${topClusters ? `<div class="tt-row" style="margin-top:5px;font-size:11px;color:#8892a4">${topClusters}</div>` : ""}
      `, ev);
    })
    .on("mouseleave", hideTooltip)
    .on("click", (ev, d) => {
      switchView("cluster");
      // After render, filter to just this service
      setTimeout(() => {
        const allSvcs = new Set((DATA.services||[]).map(s => s.id));
        SVC_FILTER = new Set([...allSvcs].filter(s => s !== d.id));
        applyServiceFilter();
        syncFilterCheckboxes();
      }, 50);
    });

  nodeSel.append("text")
    .attr("text-anchor","middle").attr("dy","0.35em")
    .attr("font-size", d => Math.min(13, d.r * 0.45))
    .attr("fill","#fff")
    .attr("font-weight","600")
    .text(d => d.id.length > 18 ? d.id.slice(0,16)+"…" : d.id);

  // Simulation
  sim = d3.forceSimulation(nodes)
    .force("link",    d3.forceLink(links).id(d => d.id).distance(d => 120 + Math.sqrt(d.weight||1)*10))
    .force("charge",  d3.forceManyBody().strength(-600))
    .force("collide", d3.forceCollide(d => d.r + 20))
    .force("center",  d3.forceCenter(0, 0))
    .on("tick", () => {
      linkSel
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
    });

  nodeSel.call(d3.drag()
    .on("start", (ev,d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (ev,d) => { d.fx=ev.x; d.fy=ev.y; })
    .on("end",   (ev,d) => { if (!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));
}

// ==========================================================================
// VIEW B — Cluster Map
// ==========================================================================
let clusterNodeSel = null;  // kept for search filtering

function renderCluster() {
  const sidebarW = 0;
  const { g, W, H } = setupSVG(sidebarW);
  const clusters = DATA.clusters || [];
  const edges    = DATA.cluster_edges || [];

  if (!clusters.length) {
    g.append("text").attr("text-anchor","middle").attr("fill","#8892a4")
     .text("No cluster data available");
    return;
  }

  const rScale = makeRadiusScale(clusters.map(c => c.symbol_count), 12, 60);

  const nodes = clusters.map(c => ({
    ...c,
    r:      rScale(c.symbol_count),
    color:  serviceColor[c.service] || "#666",
  }));
  const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));

  const links = edges
    .map(e => ({ source: e.source, target: e.target, weight: e.weight }))
    .filter(e => nodeById[e.source] && nodeById[e.target]);

  const wMax   = d3.max(links, l => l.weight) || 10;
  const wScale = d3.scaleLog().domain([1, wMax]).range([1, 6]);

  // Links
  const linkSel = g.append("g").attr("class","links").selectAll("line")
    .data(links).join("line")
    .attr("class","link")
    .attr("stroke","#e07b39")
    .attr("stroke-width", d => wScale(Math.max(d.weight||1, 1)))
    .attr("stroke-opacity", 0.35);

  // Nodes
  const nodeSel = g.append("g").selectAll(".node")
    .data(nodes).join("g").attr("class","node");

  clusterNodeSel = nodeSel; // keep ref for search

  nodeSel.append("circle")
    .attr("r", d => d.r)
    .attr("fill", d => d.color)
    .attr("fill-opacity", 0.8)
    .attr("stroke", d => d.color)
    .attr("stroke-width", 1.5)
    .attr("stroke-opacity", 0.5)
    .on("mousemove", (ev, d) => {
      const purpose = (d.purpose||"").slice(0,150) + ((d.purpose||"").length>150?"…":"");
      const flags   = (d.risk_flags||[]).map(f=>`<span class="tt-flag">${f}</span>`).join(" ");
      const contr   = (d.contracts||[]).slice(0,3).map(c=>`<span class="tt-tag">${c}</span>`).join(" ");
      showTooltip(`
        <div class="tt-title">${d.label || "Cluster "+d.id}</div>
        <div class="tt-row" style="margin-bottom:4px;font-size:11px;color:#8892a4">${d.service || ""}</div>
        ${purpose ? `<div class="tt-row" style="margin-bottom:6px">${purpose}</div>` : ""}
        <div class="tt-row">Symbols: <strong>${(d.symbol_count||0).toLocaleString()}</strong> &nbsp; Modules: <strong>${(d.module_count||0)}</strong></div>
        ${flags  ? `<div style="margin-top:5px">${flags}</div>`  : ""}
        ${contr  ? `<div style="margin-top:4px">${contr}</div>` : ""}
      `, ev);
    })
    .on("mouseleave", hideTooltip)
    .on("click", (ev, d) => {
      hideTooltip();
      switchView("module", d);
    });

  // Labels for large nodes
  nodeSel.append("text")
    .attr("text-anchor","middle").attr("dy","0.35em")
    .attr("font-size", d => Math.min(11, d.r * 0.35))
    .attr("fill","#fff")
    .attr("fill-opacity", d => d.r >= 30 ? 0.9 : 0)
    .attr("pointer-events","none")
    .text(d => {
      const lbl = d.label || `Cluster ${d.id}`;
      return lbl.length > 18 ? lbl.slice(0, 16) + "…" : lbl;
    });

  // Simulation
  sim = d3.forceSimulation(nodes)
    .force("link",    d3.forceLink(links).id(d => d.id).distance(d => 80 + Math.sqrt(d.weight||1)*4))
    .force("charge",  d3.forceManyBody().strength(-300))
    .force("collide", d3.forceCollide(d => d.r + 8))
    .force("center",  d3.forceCenter(0, 0))
    .on("tick", () => {
      linkSel
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
    });

  nodeSel.call(d3.drag()
    .on("start", (ev,d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (ev,d) => { d.fx=ev.x; d.fy=ev.y; })
    .on("end",   (ev,d) => { if (!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  // Apply current filter
  applyServiceFilter();
}

// Service filter helpers
function applyServiceFilter() {
  if (!clusterNodeSel) return;
  clusterNodeSel.classed("dimmed", d => SVC_FILTER.has(d.service));
  applySearchFilter();
}

function onSearch(q) {
  SEARCH_Q = q.trim().toLowerCase();
  applySearchFilter();
}

function applySearchFilter() {
  if (!clusterNodeSel) return;
  if (!SEARCH_Q) {
    // remove search dimming but keep service filter
    clusterNodeSel.classed("dimmed", d => SVC_FILTER.has(d.service));
    return;
  }
  clusterNodeSel.classed("dimmed", d => {
    if (SVC_FILTER.has(d.service)) return true;
    const lbl = (d.label || "").toLowerCase();
    const purp = (d.purpose || "").toLowerCase();
    return !(lbl.includes(SEARCH_Q) || purp.includes(SEARCH_Q));
  });
}

// ==========================================================================
// VIEW C — Module Detail
// ==========================================================================
function renderModule(clusterNode) {
  const { g, W, H } = setupSVG(parseInt(getComputedStyle(document.documentElement)
    .getPropertyValue("--sidebar-w")));

  const mods = (DATA.modules || {})[String(clusterNode.id)] || [];
  if (!mods.length) {
    g.append("text").attr("text-anchor","middle").attr("fill","#8892a4")
     .text("No module data for this cluster");
    return;
  }

  const rScale = makeRadiusScale(mods.map(m => m.symbol_count), 8, 40);
  const baseColor = serviceColor[clusterNode.service] || "#666";

  // Build cochange edges within cluster
  const modSet = new Set(mods.map(m => m.id));
  const edgePairs = new Set();
  const links = [];

  mods.forEach(m => {
    (m.top_cochange || []).forEach(peer => {
      if (modSet.has(peer)) {
        const key = [m.id, peer].sort().join("||");
        if (!edgePairs.has(key)) {
          edgePairs.add(key);
          links.push({ source: m.id, target: peer });
        }
      }
    });
  });

  const nodes = mods.map(m => ({
    ...m,
    r: rScale(m.symbol_count),
  }));

  // Links
  const linkSel = g.append("g").attr("class","links").selectAll("line")
    .data(links).join("line")
    .attr("class","link")
    .attr("stroke", baseColor)
    .attr("stroke-width", 1.5)
    .attr("stroke-opacity", 0.4);

  // Nodes
  const nodeSel = g.append("g").selectAll(".node")
    .data(nodes).join("g").attr("class","node");

  nodeSel.append("circle")
    .attr("r", d => d.r)
    .attr("fill", baseColor)
    .attr("fill-opacity", 0.65)
    .attr("stroke", baseColor)
    .attr("stroke-width", 1.5)
    .attr("stroke-opacity", 0.5)
    .on("mousemove", (ev, d) => {
      showTooltip(`
        <div class="tt-title" style="font-size:12px;word-break:break-all">${d.id}</div>
        <div class="tt-row">Symbols: <strong>${(d.symbol_count||0).toLocaleString()}</strong></div>
        <div class="tt-row">Lang: <strong>${d.lang || "—"}</strong></div>
      `, ev);
    })
    .on("mouseleave", hideTooltip);

  nodeSel.append("text")
    .attr("text-anchor","middle").attr("dy","0.35em")
    .attr("font-size", d => Math.min(10, d.r * 0.55))
    .attr("fill","#fff")
    .attr("fill-opacity", d => d.r >= 16 ? 0.9 : 0)
    .text(d => d.label || d.id.split("::").slice(-1)[0]);

  // Simulation
  sim = d3.forceSimulation(nodes)
    .force("link",    d3.forceLink(links).id(d => d.id).distance(80))
    .force("charge",  d3.forceManyBody().strength(-200))
    .force("collide", d3.forceCollide(d => d.r + 10))
    .force("center",  d3.forceCenter(0, 0))
    .on("tick", () => {
      linkSel
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
    });

  nodeSel.call(d3.drag()
    .on("start", (ev,d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (ev,d) => { d.fx=ev.x; d.fy=ev.y; })
    .on("end",   (ev,d) => { if (!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));
}

// ==========================================================================
// Sidebar fill (View C)
// ==========================================================================
function fillSidebar(clusterNode) {
  const sb    = document.getElementById("sidebar");
  const flags = (clusterNode.risk_flags || [])
    .map(f => `<span class="badge">${escHtml(f)}</span>`).join("");
  const contracts = (clusterNode.contracts || [])
    .map(c => `<li>${escHtml(c)}</li>`).join("");

  sb.innerHTML = `
    <h2>${escHtml(clusterNode.label || "Cluster "+clusterNode.id)}</h2>
    <p class="purpose">${escHtml(clusterNode.purpose || "No description available.")}</p>
    ${flags ? `<h3>Risk Flags</h3><div class="badge-row">${flags}</div>` : ""}
    ${contracts ? `<h3>Contracts</h3><ul class="contracts-list">${contracts}</ul>` : ""}
    <div style="margin-top:16px;color:var(--text-muted);font-size:11px">
      Service: ${escHtml(clusterNode.service||"")}<br>
      ${(clusterNode.symbol_count||0).toLocaleString()} symbols &nbsp;·&nbsp; ${(clusterNode.module_count||0)} modules
    </div>
  `;
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ==========================================================================
// Breadcrumb
// ==========================================================================
function addBreadcrumb(label) {
  removeBreadcrumb();
  const tabs = document.getElementById("tabs");

  const sep = document.createElement("button");
  sep.className = "tab breadcrumb-sep";
  sep.id = "bc-sep";
  sep.textContent = "/";

  const btn = document.createElement("button");
  btn.className = "tab active";
  btn.id = "bc-module";
  btn.textContent = label.length > 28 ? label.slice(0, 26) + "…" : label;

  tabs.appendChild(sep);
  tabs.appendChild(btn);
}

function removeBreadcrumb() {
  ["bc-sep","bc-module"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.remove();
  });
}

// ==========================================================================
// Filter panel
// ==========================================================================
function buildFilterPanel(services) {
  const container = document.getElementById("filter-items");
  container.innerHTML = "";
  services.forEach(svc => {
    const color = serviceColor[svc.id] || "#666";
    const div   = document.createElement("label");
    div.className = "filter-item";
    div.innerHTML = `
      <input type="checkbox" checked data-svc="${escHtml(svc.id)}" onchange="toggleService('${escHtml(svc.id)}', this.checked)"/>
      <span class="filter-swatch" style="background:${color}"></span>
      <span class="filter-label">${escHtml(svc.id)}</span>
    `;
    container.appendChild(div);
  });
}

function toggleService(svcId, checked) {
  if (checked) SVC_FILTER.delete(svcId);
  else         SVC_FILTER.add(svcId);
  applyServiceFilter();
}

function syncFilterCheckboxes() {
  document.querySelectorAll("#filter-items input[type=checkbox]").forEach(cb => {
    const svc = cb.dataset.svc;
    cb.checked = !SVC_FILTER.has(svc);
  });
}

// ==========================================================================
// VIEW D — 2D Scatter (Canvas-based, 114k points)
// ==========================================================================
let SCATTER_DATA      = null;   // loaded lazily
let SCATTER_COLOR_BY  = "service";
let SCATTER_TRANSFORM = d3.zoomIdentity;
let SCATTER_QUADTREE  = null;
let scatterCanvas     = document.getElementById("scatter-canvas");
let scatterAnimFrame  = null;

// 60-hue palette for clusters (distinct across 56+ entries)
const CLUSTER_PALETTE = Array.from({length: 64}, (_, i) =>
  `hsl(${Math.round(i * 360 / 64)},65%,55%)`
);

function setScatterColor(by) {
  SCATTER_COLOR_BY = by;
  document.getElementById("cbtn-service").classList.toggle("active", by === "service");
  document.getElementById("cbtn-cluster").classList.toggle("active", by === "cluster");
  scheduleScatterDraw();
}

function scheduleScatterDraw() {
  if (scatterAnimFrame) cancelAnimationFrame(scatterAnimFrame);
  scatterAnimFrame = requestAnimationFrame(() => drawScatter(SCATTER_TRANSFORM));
}

function scatterColorOf(i) {
  if (SCATTER_COLOR_BY === "service") {
    return SERVICE_PALETTE[SCATTER_DATA.svc[i] % SERVICE_PALETTE.length];
  }
  return CLUSTER_PALETTE[SCATTER_DATA.cls[i] % CLUSTER_PALETTE.length];
}

function buildQuadtree(W, H) {
  const SD = SCATTER_DATA;
  const pts = Array.from({length: SD.n}, (_, i) => ({
    i, x: SD.x[i] * W, y: SD.y[i] * H
  }));
  SCATTER_QUADTREE = d3.quadtree()
    .x(d => d.x).y(d => d.y)
    .addAll(pts);
}

function drawScatter(transform) {
  if (!SCATTER_DATA || VIEW !== "scatter") return;
  const SD  = SCATTER_DATA;
  const W   = scatterCanvas.width;
  const H   = scatterCanvas.height;
  const ctx = scatterCanvas.getContext("2d");
  ctx.clearRect(0, 0, W, H);

  const k = transform.k;
  // dot radius: bigger when zoomed in, smaller when zoomed out
  const r = Math.max(0.6, Math.min(4, k * 1.2));

  // Group indices by color for batched drawing (fast for 114k points)
  const groups = new Map();
  for (let i = 0; i < SD.n; i++) {
    const c = scatterColorOf(i);
    if (!groups.has(c)) groups.set(c, []);
    groups.get(c).push(i);
  }

  ctx.globalAlpha = Math.max(0.25, Math.min(0.85, 0.5 + k * 0.1));

  for (const [color, indices] of groups) {
    ctx.fillStyle = color;
    ctx.beginPath();
    for (const i of indices) {
      const sx = transform.applyX(SD.x[i] * W);
      const sy = transform.applyY(SD.y[i] * H);
      if (sx < -r || sx > W + r || sy < -r || sy > H + r) continue;
      ctx.moveTo(sx + r, sy);
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
    }
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function initScatterCanvas() {
  const container = document.getElementById("canvas");
  scatterCanvas.width  = container.clientWidth;
  scatterCanvas.height = container.clientHeight;

  const zoom = d3.zoom()
    .scaleExtent([0.1, 50])
    .on("zoom", ev => {
      SCATTER_TRANSFORM = ev.transform;
      scheduleScatterDraw();
    });

  d3.select(scatterCanvas).call(zoom)
    .call(zoom.transform, d3.zoomIdentity);

  // Hover tooltip
  scatterCanvas.addEventListener("mousemove", ev => {
    if (!SCATTER_QUADTREE || !SCATTER_DATA) return;
    const SD  = SCATTER_DATA;
    const W   = scatterCanvas.width;
    const H   = scatterCanvas.height;
    const t   = SCATTER_TRANSFORM;
    // Convert screen coords to data coords
    const dx  = (ev.offsetX - t.x) / t.k / W;
    const dy  = (ev.offsetY - t.y) / t.k / H;
    const threshold = 15 / t.k / W;  // 15px in data space
    const pt = SCATTER_QUADTREE.find(dx * W, dy * H, threshold * W);
    if (pt) {
      const i   = pt.i;
      const svc = SD.services[SD.svc[i]] || "";
      const cls = SD.cluster_labels[SD.cls[i]] || "";
      showTooltip(`
        <div class="tt-title" style="word-break:break-all">${escHtml(SD.names[i])}</div>
        <div class="tt-row">Service: <strong>${escHtml(svc)}</strong></div>
        <div class="tt-row">Cluster: <strong>${escHtml(cls)}</strong></div>
      `, ev);
    } else {
      hideTooltip();
    }
  });
  scatterCanvas.addEventListener("mouseleave", hideTooltip);
}

function renderScatter() {
  const container   = document.getElementById("canvas");
  scatterCanvas.width  = container.clientWidth;
  scatterCanvas.height = container.clientHeight;
  scatterCanvas.style.display = "block";
  document.getElementById("scatter-controls").style.display = "block";

  if (SCATTER_DATA) {
    buildQuadtree(scatterCanvas.width, scatterCanvas.height);
    scheduleScatterDraw();
    return;
  }

  // Show loading state
  const ctx = scatterCanvas.getContext("2d");
  ctx.fillStyle = "#8892a4";
  ctx.font = "14px system-ui";
  ctx.textAlign = "center";
  ctx.fillText("Loading scatter_data.json …", scatterCanvas.width / 2, scatterCanvas.height / 2);

  fetch("scatter_data.json")
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status} — run build/09b_build_scatter_data.py first`);
      return r.json();
    })
    .then(sd => {
      SCATTER_DATA = sd;
      initScatterCanvas();
      buildQuadtree(scatterCanvas.width, scatterCanvas.height);
      // Update note
      document.getElementById("scatter-note").innerHTML =
        `${(sd.n || 0).toLocaleString()} symbols<br>${(sd.services||[]).length} services · ${(sd.cluster_labels||[]).length} clusters`;
      scheduleScatterDraw();
    })
    .catch(err => {
      ctx.clearRect(0, 0, scatterCanvas.width, scatterCanvas.height);
      ctx.fillStyle = "#ef4444";
      ctx.fillText(`${err.message}`, scatterCanvas.width / 2, scatterCanvas.height / 2 - 16);
      ctx.fillStyle = "#8892a4";
      ctx.font = "12px system-ui";
      ctx.fillText("pip install umap-learn scikit-learn lancedb", scatterCanvas.width / 2, scatterCanvas.height / 2 + 10);
      ctx.fillText("then: python3 build/09b_build_scatter_data.py", scatterCanvas.width / 2, scatterCanvas.height / 2 + 28);
    });
}

// ==========================================================================
// Window resize — re-render current view
// ==========================================================================
let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if      (VIEW === "service") { clearGraph(); renderService(); }
    else if (VIEW === "cluster") { clearGraph(); renderCluster(); applyServiceFilter(); }
    else if (VIEW === "module" && ACTIVE_CLUSTER !== null) {
      const cn = (DATA.clusters||[]).find(c => c.id === ACTIVE_CLUSTER);
      if (cn) { clearGraph(); renderModule(cn); }
    } else if (VIEW === "scatter") {
      scatterCanvas.width  = document.getElementById("canvas").clientWidth;
      scatterCanvas.height = document.getElementById("canvas").clientHeight;
      if (SCATTER_DATA) {
        buildQuadtree(scatterCanvas.width, scatterCanvas.height);
        scheduleScatterDraw();
      }
    }
  }, 200);
});
</script>
